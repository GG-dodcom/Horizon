name: Verify secrets

# Manual-dispatch sanity check for the three Phase 1 secrets:
#   DEEPSEEK_API_KEY, TELEGRAM_WEBHOOK_URL_HORIZON, TELEGRAM_CHAT_ID_HORIZON
#
# Sends a real test message to the configured Telegram chat — you should see
# "🧪 Phase 1 secrets test ..." appear in M's Tech Brief. If you do, all three
# secrets are wired correctly.
#
# Keep this file around: it's handy to re-run after rotating a secret.

on:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Check DEEPSEEK_API_KEY (1-token completion)
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          set -u
          if [ -z "${DEEPSEEK_API_KEY:-}" ]; then
            echo "::error::DEEPSEEK_API_KEY is empty or unset on this repo"
            exit 1
          fi
          echo "DEEPSEEK_API_KEY length: ${#DEEPSEEK_API_KEY}"
          status=$(curl -sS -o /tmp/ds.json -w '%{http_code}' \
            -H "Authorization: Bearer $DEEPSEEK_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{"model":"deepseek-v4-flash","messages":[{"role":"user","content":"hi"}],"max_tokens":1}' \
            https://api.deepseek.com/v1/chat/completions)
          echo "HTTP $status"
          if [ "$status" != "200" ]; then
            echo "::error::DeepSeek API rejected the key — check the value, or the model name 'deepseek-v4-flash'"
            cat /tmp/ds.json
            exit 1
          fi
          finish=$(jq -r '.choices[0].finish_reason // "unknown"' /tmp/ds.json)
          echo "✓ DEEPSEEK_API_KEY valid (finish_reason: $finish)"

      - name: Check TELEGRAM_WEBHOOK_URL_HORIZON (bot token via getMe)
        env:
          TELEGRAM_WEBHOOK_URL_HORIZON: ${{ secrets.TELEGRAM_WEBHOOK_URL_HORIZON }}
        run: |
          set -u
          if [ -z "${TELEGRAM_WEBHOOK_URL_HORIZON:-}" ]; then
            echo "::error::TELEGRAM_WEBHOOK_URL_HORIZON is empty or unset"
            exit 1
          fi
          case "$TELEGRAM_WEBHOOK_URL_HORIZON" in
            https://api.telegram.org/bot*/sendMessage)
              :
              ;;
            *)
              echo "::error::TELEGRAM_WEBHOOK_URL_HORIZON does not match expected shape: https://api.telegram.org/bot<TOKEN>/sendMessage"
              exit 1
              ;;
          esac
          getme="${TELEGRAM_WEBHOOK_URL_HORIZON%/sendMessage}/getMe"
          status=$(curl -sS -o /tmp/tg.json -w '%{http_code}' "$getme")
          echo "HTTP $status"
          if [ "$status" != "200" ]; then
            echo "::error::Telegram getMe rejected — bot token in TELEGRAM_WEBHOOK_URL_HORIZON is invalid"
            jq -r '.description // "(no description)"' /tmp/tg.json
            exit 1
          fi
          username=$(jq -r '.result.username' /tmp/tg.json)
          name=$(jq -r '.result.first_name' /tmp/tg.json)
          echo "✓ Bot OK: @$username ($name)"

      - name: Check TELEGRAM_CHAT_ID_HORIZON (send real test message)
        env:
          TELEGRAM_WEBHOOK_URL_HORIZON: ${{ secrets.TELEGRAM_WEBHOOK_URL_HORIZON }}
          TELEGRAM_CHAT_ID_HORIZON:     ${{ secrets.TELEGRAM_CHAT_ID_HORIZON }}
        run: |
          set -u
          if [ -z "${TELEGRAM_CHAT_ID_HORIZON:-}" ]; then
            echo "::error::TELEGRAM_CHAT_ID_HORIZON is empty or unset"
            exit 1
          fi
          payload=$(jq -nc \
            --arg cid "$TELEGRAM_CHAT_ID_HORIZON" \
            --arg txt "🧪 *Phase 1 secrets test* — all three secrets are wired correctly. You can now merge the Horizon PR." \
            '{chat_id: $cid, text: $txt, parse_mode: "Markdown", disable_web_page_preview: true}')
          status=$(curl -sS -o /tmp/tg2.json -w '%{http_code}' \
            -H "Content-Type: application/json" \
            -d "$payload" \
            "$TELEGRAM_WEBHOOK_URL_HORIZON")
          echo "HTTP $status"
          if [ "$status" != "200" ]; then
            echo "::error::sendMessage failed — common causes: chat_id wrong, bot not added as admin, bot lacks Post Messages permission"
            jq -r '.description // "(no description)"' /tmp/tg2.json
            exit 1
          fi
          msg_id=$(jq -r '.result.message_id' /tmp/tg2.json)
          chat_title=$(jq -r '.result.chat.title // .result.chat.username // "<unknown>"' /tmp/tg2.json)
          echo "✓ Test message $msg_id delivered to: $chat_title"

      - name: Summary
        if: success()
        run: |
          echo "All three secrets verified. Check M's Tech Brief — you should see the 🧪 test message."
          echo "Safe to merge the Phase 1 PR now."
