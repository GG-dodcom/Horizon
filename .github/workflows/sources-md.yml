name: Regenerate SOURCES.md

# Runs whenever data/config.json or the generator script changes on main.
# Regenerates SOURCES.md from config.json and commits if it actually changed.
# `[skip ci]` in the commit message prevents the resulting push from re-triggering this workflow.
on:
  push:
    branches: [main]
    paths:
      - 'data/config.json'
      - 'scripts/gen_sources_md.py'
      - '.github/workflows/sources-md.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  regen:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Need a real token (not GITHUB_TOKEN's default) only if we want the
          # bot's push to trigger other workflows. We don't, so default is fine.
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Regenerate SOURCES.md
        run: python scripts/gen_sources_md.py

      - name: Commit if changed
        run: |
          if git diff --quiet SOURCES.md; then
            echo "SOURCES.md unchanged — nothing to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add SOURCES.md
          git commit -m "chore(docs): regenerate SOURCES.md [skip ci]"
          git push
