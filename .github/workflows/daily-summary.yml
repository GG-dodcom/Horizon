name: Daily Horizon Summary

on:
  schedule:
    # 22:00 UTC = 06:00 next-day in UTC+8 (Asia). Adjust cron if user TZ differs.
    - cron: '0 22 * * *'
  workflow_dispatch:      # Allow manual trigger

jobs:
  daily-summary:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Needed to commit changes

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync

      - name: Run Horizon
        # Horizon's built-in webhook is disabled (data/config.json: webhook.enabled=false).
        # Telegram delivery is handled by scripts/send_tg_brief.py below after
        # Pages is deployed, so the linked URL works immediately.
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: uv run horizon --hours 48

      - name: Set current date as environment variable
        run: echo "DATE=$(date +'%Y-%m-%d')" >> $GITHUB_ENV

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          keep_files: true  # Keep existing summaries on gh-pages branch
          commit_message: "📝 Daily Summary: ${{ env.DATE }}"
          publish_branch: gh-pages
          enable_jekyll: true

      - name: Send brief TOC to Telegram
        # Runs AFTER Pages deploy so the linked URL is live when user taps it.
        env:
          TELEGRAM_WEBHOOK_URL_HORIZON: ${{ secrets.TELEGRAM_WEBHOOK_URL_HORIZON }}
          TELEGRAM_CHAT_ID_HORIZON:     ${{ secrets.TELEGRAM_CHAT_ID_HORIZON }}
          PAGES_BASE:                   https://gg-dodcom.github.io/Horizon
          TG_LANG:                      zh
        run: python scripts/send_tg_brief.py
