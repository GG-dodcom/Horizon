name: Daily Horizon Summary

on:
  schedule:
    # 22:00 UTC = 06:00 next-day in UTC+8 (Asia). Adjust cron if user TZ differs.
    - cron: '0 22 * * *'
  workflow_dispatch:      # Allow manual trigger

jobs:
  daily-summary:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Needed to commit changes

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync

      - name: Inject Telegram chat ID into config
        # chat_id is not sensitive, but storing it as a GH secret keeps the
        # committed config.json clean and re-usable across forks.
        env:
          TG_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID_HORIZON }}
        run: |
          jq --arg cid "$TG_CHAT_ID" '.webhook.request_body.chat_id = $cid' data/config.json > /tmp/c.json
          mv /tmp/c.json data/config.json
          jq '.webhook.request_body.chat_id' data/config.json

      - name: Run Horizon
        env:
          GOOGLE_API_KEY:               ${{ secrets.GOOGLE_API_KEY }}
          TELEGRAM_WEBHOOK_URL_HORIZON: ${{ secrets.TELEGRAM_WEBHOOK_URL_HORIZON }}
        run: uv run horizon --hours 48

      - name: Set current date as environment variable
        run: echo "DATE=$(date +'%Y-%m-%d')" >> $GITHUB_ENV

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          keep_files: true  # Keep existing summaries on gh-pages branch
          commit_message: "📝 Daily Summary: ${{ env.DATE }}"
          publish_branch: gh-pages
          enable_jekyll: true
